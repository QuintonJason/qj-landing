name: Deploy Gatsby site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          yarn install --ignore-engines --non-interactive 2>&1 | tee install.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            {
              echo "### Install completed with warnings/nonzero status"
              echo
              echo '```text'
              tail -80 install.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            while IFS= read -r line; do
              echo "::warning::$line"
            done < <(tail -30 install.log)
          fi

      - name: Build Gatsby site
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
